[single]
# Replace with the actual IP or hostname of your server.
# Use ansible_connection=local if running the playbook directly on the target.

# Example with SSH key authentication:
# vpn.example.org ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

# Example with password authentication (requires sshpass):
# 203.0.113.10 ansible_user=root ansible_ssh_pass=your_password

# Example for local execution (when running on the VPN server itself):
# localhost ansible_connection=local
