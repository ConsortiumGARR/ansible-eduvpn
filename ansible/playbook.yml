---
# =============================================================================
#  eduVPN single-server all-in-one deployment
#  Combines the user portal (frontend) and VPN server node (backend)
#  on the same host.
# =============================================================================
- name: eduVPN single-server deployment (portal + node)
  hosts: all
  become: true

  tasks:

    ###########################################################################
    # SYSTEM PACKAGES
    ###########################################################################

    - name: Install apt packages for portal
      ansible.builtin.apt:
        update_cache: true
        pkg:
          - apt-transport-https
          - curl
          - apache2
          - php-fpm
          - pwgen
          - iptables-persistent
          - sudo
          - lsb-release
          - ipcalc-ng
          - tmux
          - gnupg
          - libapache2-mod-auth-openidc
          - memcached
          - php-memcached
          - rsync
          - certbot

    ###########################################################################
    # eduVPN REPOSITORY
    ###########################################################################

    - name: Ensure eduvpn source directory exists
      ansible.builtin.file:
        path: "{{ prj_source }}"
        state: directory
        mode: "0755"

    - name: Download and unpack eduVPN deploy archive
      ansible.builtin.unarchive:
        src: https://codeberg.org/eduVPN/deploy/archive/v3.tar.gz
        dest: "{{ prj_source }}"
        creates: "{{ prj_source }}/deploy"
        remote_src: true

    - name: Get Debian architecture
      ansible.builtin.command: dpkg --print-architecture
      register: DEBIAN_ARCH
      changed_when: false

    - name: Get PHP version
      ansible.builtin.command: /usr/sbin/phpquery -V
      register: PHP_VERSION
      changed_when: false

    - name: Add eduVPN GPG key
      ansible.builtin.apt_key:
        file: "{{ prj_source }}/deploy/resources/repo+v3@eduvpn.org.gpg"
        state: present
        keyring: /usr/share/keyrings/repo+v3@eduvpn.org.gpg

    - name: Add eduVPN apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ DEBIAN_ARCH.stdout }}
          signed-by=/usr/share/keyrings/repo+v3@eduvpn.org.gpg]
          https://repo.eduvpn.org/v3/deb {{ debian_code_name }} main
        filename: eduVPN_v3
        state: present

    ###########################################################################
    # eduVPN PACKAGES
    ###########################################################################

    - name: Install vpn-user-portal (frontend) packages
      ansible.builtin.apt:
        update_cache: true
        pkg:
          - vpn-user-portal
          - vpn-maint-scripts
        state: latest  # noqa: package-latest

    - name: Install vpn-server-node (backend) package
      ansible.builtin.apt:
        update_cache: false
        pkg:
          - vpn-server-node
        state: latest  # noqa: package-latest

    ###########################################################################
    # eduVPN CONFIGURATION
    ###########################################################################

    - name: Deploy portal config.php
      ansible.builtin.template:
        src: eduvpn/portal-config.php.j2
        dest: /etc/vpn-user-portal/config.php
        owner: www-data
        group: www-data
        mode: "0640"
      notify: Apply eduvpn changes
      tags: [update_config]

    - name: Deploy node config.php
      ansible.builtin.template:
        src: eduvpn/node-config.php.j2
        dest: /etc/vpn-server-node/config.php
        mode: "0644"
      notify: Apply eduvpn changes
      tags: [update_config]

    ###########################################################################
    # CRYPTO KEYS
    ###########################################################################

    - name: Copy CA certificate to portal
      ansible.builtin.template:
        src: keys/ca.crt.j2
        dest: /etc/vpn-user-portal/keys/ca/ca.crt
        mode: "0644"

    - name: Copy CA key to portal
      ansible.builtin.template:
        src: keys/ca.key.j2
        dest: /etc/vpn-user-portal/keys/ca/ca.key
        owner: www-data
        group: www-data
        mode: "0600"

    - name: Ensure oauth.key is generated by vpn-user-portal
      ansible.builtin.command: /usr/libexec/vpn-user-portal/generate-secrets
      args:
        creates: /etc/vpn-user-portal/keys/oauth.key
      changed_when: true
      notify: Apply eduvpn changes

    - name: Copy node key (node.0.key) to portal
      ansible.builtin.copy:
        content: "{{ vault_node_key }}"
        dest: /etc/vpn-user-portal/keys/node.0.key
        owner: www-data
        group: www-data
        mode: "0600"

    - name: Copy node key to vpn-server-node
      ansible.builtin.copy:
        content: "{{ vault_node_key }}"
        dest: /etc/vpn-server-node/keys/node.key
        mode: "0600"
      notify: Apply eduvpn changes

    # WireGuard key distribution (run with tag wg)
    - name: Ensure WireGuard key directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0700"
      loop:
        - /var/lib/vpn-user-portal/keys
      tags: [never, wg]

    - name: Copy WireGuard public key to portal
      ansible.builtin.copy:
        content: "{{ vault_wireguard_public_key }}"
        dest: /var/lib/vpn-user-portal/keys/wireguard.0.public.key
        owner: www-data
        group: www-data
        mode: "0644"
      tags: [never, wg]

    - name: Copy WireGuard private key to node
      ansible.builtin.copy:
        content: "{{ vault_wireguard_private_key }}"
        dest: /etc/vpn-server-node/keys/wireguard.key
        mode: "0600"
      notify: Apply eduvpn changes
      tags: [never, wg]

    ###########################################################################
    # vpn-daemon runtime (single-host)
    ###########################################################################

    - name: Deploy vpn-daemon default env file
      ansible.builtin.template:
        src: eduvpn/vpn-daemon.env.j2
        dest: /etc/default/vpn-daemon
      notify: Restart vpn-daemon

    - name: Remove vpn-daemon systemd credentials override
      ansible.builtin.file:
        path: /etc/systemd/system/vpn-daemon.service.d/credentials.conf
        state: absent
      notify: Restart vpn-daemon

    ###########################################################################
    # CERTBOT (AUTOMATED CERTIFICATE PROVISIONING)
    ###########################################################################

    - name: Check if Let's Encrypt certificate already exists
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ certbot_certs[0].domains[0] }}/fullchain.pem"
      register: certbot_cert_stat
      when: certbot_create_if_missing | bool

    - name: Stop services required by certbot standalone
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
      loop: "{{ certbot_create_standalone_stop_services }}"
      when:
        - certbot_create_if_missing | bool
        - certbot_create_method == 'standalone'
        - not certbot_cert_stat.stat.exists

    - name: Obtain Let's Encrypt certificate using certbot standalone
      ansible.builtin.command:
        cmd: >-
          {{ certbot_script }} certonly --standalone --non-interactive --agree-tos
          --email {{ certbot_admin_email }}
          {% if certbot_testmode | bool %}--test-cert{% endif %}
          {% for domain in certbot_certs[0].domains %}-d {{ domain }} {% endfor %}
        creates: "/etc/letsencrypt/live/{{ certbot_certs[0].domains[0] }}/fullchain.pem"
      when:
        - certbot_create_if_missing | bool
        - certbot_create_method == 'standalone'
        - not certbot_cert_stat.stat.exists

    - name: Start services stopped for certbot standalone
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
      loop: "{{ certbot_create_standalone_stop_services }}"
      when:
        - certbot_create_if_missing | bool
        - certbot_create_method == 'standalone'
        - not certbot_cert_stat.stat.exists

    ###########################################################################
    # APACHE
    ###########################################################################

    - name: Copy ssl.conf from deploy resources
      ansible.builtin.copy:
        src: "{{ prj_source }}/deploy/resources/ssl.debian.conf"
        dest: /etc/apache2/mods-available/ssl.conf
        remote_src: true

    - name: Deploy main virtual-host config
      ansible.builtin.template:
        src: apache2/apache_site-eduvpn.conf.j2
        dest: "/etc/apache2/sites-available/{{ eduvpn_fqdn }}.conf"
      notify: Restart apache2

    - name: Deploy vpn-user-portal site config
      ansible.builtin.template:
        src: apache2/apache_site-vpn-user-portal.conf.j2
        dest: /etc/apache2/sites-available/vpn-user-portal.conf
      notify: Restart apache2

    - name: Deploy localhost site config
      ansible.builtin.copy:
        src: "{{ prj_source }}/deploy/resources/localhost.debian.conf"
        dest: /etc/apache2/sites-available/localhost.conf
        remote_src: true

    - name: Enable required apache2 modules
      community.general.apache2_module:
        state: present
        name: "{{ item }}"
      loop:
        - ssl
        - headers
        - rewrite
        - proxy_fcgi
        - setenvif
        - proxy_http
      notify: Restart apache2

    - name: Disable apache2 status module
      community.general.apache2_module:
        state: absent
        name: status
      notify: Restart apache2

    - name: Enable php-fpm configuration
      ansible.builtin.file:
        src: "/etc/apache2/conf-available/php{{ PHP_VERSION.stdout }}-fpm.conf"
        dest: "/etc/apache2/conf-enabled/php{{ PHP_VERSION.stdout }}-fpm.conf"
        state: link
      notify: Restart apache2

    - name: Enable main eduVPN site
      ansible.builtin.file:
        src: "/etc/apache2/sites-available/{{ eduvpn_fqdn }}.conf"
        dest: "/etc/apache2/sites-enabled/{{ eduvpn_fqdn }}.conf"
        state: link
      notify: Restart apache2

    - name: Enable vpn-user-portal site
      ansible.builtin.file:
        src: /etc/apache2/sites-available/vpn-user-portal.conf
        dest: /etc/apache2/sites-enabled/vpn-user-portal.conf
        state: link
      notify: Restart apache2

    - name: Disable apache2 default site
      ansible.builtin.file:
        dest: /etc/apache2/sites-enabled/000-default.conf
        state: absent
      notify: Restart apache2

    ###########################################################################
    # MEMCACHED
    ###########################################################################

    - name: Deploy memcached config
      ansible.builtin.template:
        src: memcached/memcached.conf.j2
        dest: /etc/memcached.conf
      notify: Restart memcached

    ###########################################################################
    # NETWORK – IP FORWARDING
    ###########################################################################

    - name: Enable IPv4 forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: true
        reload: false

    - name: Enable IPv6 forwarding
      ansible.posix.sysctl:
        name: net.ipv6.conf.all.forwarding
        value: "1"
        sysctl_set: true
        reload: true

    ###########################################################################
    # FIREWALL
    ###########################################################################

    - name: Deploy iptables IPv4 rules
      ansible.builtin.template:
        src: iptables/iptables.j2
        dest: /etc/iptables/rules.v4
      tags: iptables

    - name: Deploy ip6tables IPv6 rules
      ansible.builtin.template:
        src: iptables/ip6tables.j2
        dest: /etc/iptables/rules.v6
      tags: iptables

    - name: Restore firewall rules
      ansible.builtin.systemd:
        name: netfilter-persistent
        state: restarted
        enabled: true
      tags: iptables

    ###########################################################################
    # APPLY CHANGES
    ###########################################################################

    - name: Flush handlers (ensure vpn-daemon is restarted before apply-changes)
      ansible.builtin.meta: flush_handlers

    - name: Apply all eduVPN changes
      ansible.builtin.command: vpn-maint-apply-changes
      changed_when: true

  ###########################################################################
  # HANDLERS
  ###########################################################################

  handlers:
    - name: Restart apache2
      ansible.builtin.service:
        name: apache2
        state: restarted

    - name: Restart memcached
      ansible.builtin.service:
        name: memcached
        state: restarted

    - name: Restart vpn-daemon
      ansible.builtin.systemd:
        name: vpn-daemon
        state: restarted
        daemon_reload: true
        enabled: true

    - name: Apply eduvpn changes
      ansible.builtin.command: vpn-maint-apply-changes
